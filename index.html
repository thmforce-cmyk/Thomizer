/* v16 top-strip rebuild: appended last on purpose */
:root{
  --controls-h:50px;
  --top-title-h:10px;
  --top-control-h:24px;
  --top-value-w:30px;
  --top-module-gap:6px;
  --force-value-w:32px;
  --force-label-w:44px;
  --force-high-w:58px;
}
.top-strip{
  height:var(--controls-h)!important;
  flex:0 0 var(--controls-h)!important;
  display:grid!important;
  grid-template-columns:minmax(0,1.94fr) minmax(292px,.82fr)!important;
  gap:7px!important;
  padding:0 var(--content-x)!important;
  margin-bottom:5px!important;
}
.top-strip .module{padding:4px 7px!important;overflow:hidden!important}
.module-grid{
  width:100%;height:100%;
  display:grid;
  grid-template-rows:var(--top-title-h) var(--top-control-h);
  column-gap:var(--top-module-gap);
  row-gap:3px;
  align-items:end;
}
.thomlay-strip{
  grid-template-columns:clamp(58px,7.2vw,76px) clamp(50px,5.8vw,64px) clamp(56px,6.2vw,70px) minmax(0,1fr) minmax(0,1.14fr) minmax(0,1fr);
}
.forcer-strip{
  grid-template-columns:clamp(48px,5.2vw,60px) minmax(0,1fr) var(--force-value-w);
}
.module-id{
  grid-row:1 / span 2;
  display:flex;flex-direction:column;justify-content:center;align-self:stretch;
  color:var(--amber);font-size:7px;letter-spacing:.145em;font-weight:900;text-transform:uppercase;line-height:1.02;white-space:normal;min-width:0;
}
.module-id .model{font-size:6px;color:var(--dim);letter-spacing:.16em;margin-top:1px}
.field-title{
  grid-row:1;color:var(--dim);font-size:6px;letter-spacing:.11em;font-weight:900;text-transform:uppercase;line-height:1;align-self:end;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.field-title.value-title{text-align:center}
.control-cell{grid-row:2;height:var(--top-control-h);align-self:end;min-width:0}
.top-button{
  width:100%;height:100%;border:1px solid var(--line2);background:linear-gradient(180deg,#100b08,#070605);color:var(--amber);
  display:flex;align-items:center;justify-content:center;gap:4px;padding:0 4px;font-size:7px;letter-spacing:.11em;font-weight:900;white-space:nowrap;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),inset 0 -1px 0 rgba(0,0,0,.75);
}
.top-button .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);box-shadow:0 0 7px rgba(255,180,84,.8)}
.top-button .state{display:block;transform:translateY(.5px)}
.top-button:not(.on){color:var(--faint);border-color:var(--line)}
.top-button:not(.on) .dot{background:var(--faint);box-shadow:none}
.top-strip select{
  width:100%;height:100%;border:1px solid var(--line);border-radius:0;background:#080604;color:var(--ink);
  padding:2px 18px 2px 6px;font-size:9px;letter-spacing:.05em;appearance:none;-webkit-appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--amber) 50%),linear-gradient(135deg,var(--amber) 50%,transparent 50%);

  box-shadow:inset 0 1px 2px rgba(0,0,0,.72),inset 0 0 0 1px rgba(255,180,84,.025);
}
.slider-cell{display:grid;grid-template-columns:minmax(0,1fr) var(--top-value-w);gap:4px;align-items:center;height:100%}
.slider-cell input[type="range"]{height:100%}
.value-box{
  width:100%;height:100%;border:1px solid var(--line2);background:linear-gradient(180deg,#120d0a,#050403);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),inset 0 -1px 0 rgba(0,0,0,.7);
  color:var(--amber);display:grid;place-items:center;font-size:9px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;
}
.range-assembly{display:grid;grid-template-columns:var(--force-label-w) minmax(0,1fr) var(--force-high-w);gap:4px;align-items:center;height:100%}
.range-assembly input[type="range"]{height:100%}
.range-end{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink);font-size:5.7px;letter-spacing:.095em;font-weight:900;text-transform:uppercase;line-height:1.02;text-align:center;white-space:normal}
.top-strip input[type="range"]{width:100%;height:100%;appearance:none;-webkit-appearance:none;background:transparent;cursor:pointer;touch-action:none}
.top-strip input[type="range"]::-webkit-slider-runnable-track{height:5px;border:1px solid var(--slot-line);background:linear-gradient(180deg,#080604,#010101);box-shadow:inset 0 1px 2px rgba(0,0,0,.82),0 1px 0 rgba(255,180,84,.04)}
.top-strip input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:10px;height:18px;margin-top:-7px;border:1px solid #21160f;border-radius:1px;background:linear-gradient(90deg,#030201 0 38%,var(--thumb-line) 38% 62%,#030201 62% 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 0 0 1px rgba(0,0,0,.85),0 1px 5px rgba(0,0,0,.85)}
@media (max-width:900px){
  :root{--controls-h:48px;--top-title-h:9px;--top-control-h:23px;--top-value-w:28px;--top-module-gap:4px;--force-label-w:38px;--force-high-w:48px;--force-value-w:30px}
  .top-strip{grid-template-columns:minmax(0,1.88fr) minmax(210px,.84fr)!important;gap:5px!important}
  .top-strip .module{padding:4px 6px!important}
  .thomlay-strip{grid-template-columns:56px 46px 48px minmax(0,1fr) minmax(0,1.12fr) minmax(0,.94fr)}
  .module-id{font-size:6px}.module-id .model{font-size:5px}
  .field-title{font-size:5.4px}.range-end{font-size:5.2px}
  .top-button,.top-strip select,.value-box{font-size:8px}
}
@media (max-width:640px){
  :root{--top-module-gap:3px;--top-value-w:24px;--force-label-w:30px;--force-high-w:40px;--force-value-w:26px}
  .top-strip{grid-template-columns:minmax(0,1.74fr) minmax(160px,.82fr)!important;gap:4px!important}
  .top-strip .module{padding:4px 5px!important}
  .thomlay-strip{grid-template-columns:44px 38px 40px minmax(0,1fr) minmax(0,1.08fr) minmax(0,.92fr)}
  .forcer-strip{grid-template-columns:32px minmax(0,1fr) var(--force-value-w)}
  .module-id{font-size:5.5px}.module-id .model{font-size:4.8px}
  .field-title{font-size:4.9px;letter-spacing:.08em}
  .range-end{font-size:4.7px;letter-spacing:.07em}
  .top-button,.top-strip select,.value-box{font-size:7px}
}

<body data-scale="minor">
<div class="portrait-note"><b>TURN ME SIDEWAYS</b><span>THOMIZER NEEDS THE WIDE GRID</span></div>
<div class="app">
  <header class="brandbar">
    <div class="brand"><i>THOM</i>IZER <span class="version">v.alpha.0.16</span></div>
    <div class="hint">POLY STEP SEQUENCER · THOMLAY AY-Y420 · OFFLINE</div>
  </header>
  <main class="hardware">
    <section class="top-strip" aria-label="controls">
      <section class="module thomlay-module">
        <div class="module-grid thomlay-strip">
          <div class="module-id"><span>THOMLAY</span><span class="model">AY-Y420</span></div>
          <span class="field-title">DELAY</span>
          <span class="field-title">RATE</span>
          <span class="field-title">MIX</span>
          <span class="field-title">FEEDBACK</span>
          <span class="field-title">GRIT</span>
          <button class="top-button toggle on control-cell" id="delay-on" aria-pressed="true"><span class="dot"></span><span class="state" id="delay-on-text">ON</span></button>
          <label class="control-cell">
            <select id="delay-rate" aria-label="delay rate">
              <option value="1/4">1/4</option><option value="1/4T">1/4T</option><option value="1/4D">1/4D</option><option value="1/8">1/8</option><option value="1/8T">1/8T</option><option value="1/8D" selected>1/8D</option><option value="1/16">1/16</option><option value="1/16T">1/16T</option><option value="1/16D">1/16D</option>
            </select>
          </label>
          <label class="slider-cell control-cell"><input type="range" id="delay-mix" min="0" max="100" value="24" aria-label="delay mix"><span class="value-box" id="delay-mix-v">24</span></label>
          <label class="slider-cell control-cell"><input type="range" id="delay-fb" min="0" max="80" value="28" aria-label="delay feedback"><span class="value-box" id="delay-fb-v">28</span></label>
          <label class="slider-cell control-cell"><input type="range" id="forcer" min="0" max="100" value="12" aria-label="thomlay grit"><span class="value-box" id="forcer-v">12</span></label>
        </div>
      </section>
      <section class="module how-module">
        <div class="module-grid forcer-strip">
          <div class="module-id"><span>FORCER</span><span class="model">TF-6000</span></div>
          <span class="field-title range-title">AMOUNT</span>
          <span class="field-title value-title">VAL</span>
          <div class="range-assembly control-cell">
            <span class="range-end">GENTLE</span>
            <input type="range" id="comp-amount" min="0" max="100" value="35" aria-label="forcer amount">
            <span class="range-end">NOT SO<br>GENTLE</span>
          </div>
          <div class="value-box control-cell" id="comp-amount-v">35</div>
        </div>
      </section>
    </section>
    <section class="sequencer" aria-label="polyphonic sequencer">
      <div class="seq-head" id="seq-head"></div>
      <div class="seq-grid" id="grid"></div>
    </section>
  </main>
</div>
<nav class="dock" aria-label="sticky player">
  <button class="play" id="play" aria-label="play / stop"><span id="play-icon">▶</span></button>
  <div class="dock-bpm"><b id="bpm-display">100</b><span>BPM</span></div>
  <input class="dock-range" type="range" id="bpm" min="40" max="200" value="100" aria-label="tempo">
  <select id="scale" class="dock-select" aria-label="scale">
    <option value="major">MAJOR</option><option value="minor" selected>MINOR</option><option value="dorian">DORIAN</option><option value="phrygian">PHRYGIAN</option><option value="pentatonic">PENTATONIC</option><option value="blues">BLUES</option>
  </select>
  <select id="root" class="dock-select" aria-label="root">
    <option value="0">C</option><option value="1">C#</option><option value="2">D</option><option value="3">D#</option><option value="4">E</option><option value="5">F</option><option value="6">F#</option><option value="7">G</option><option value="8">G#</option><option value="9" selected>A</option><option value="10">A#</option><option value="11">B</option>
  </select>
  <select id="oct" class="dock-select" aria-label="octave"><option value="2">2</option><option value="3">3</option><option value="4" selected>4</option><option value="5">5</option><option value="6">6</option></select>
  <select id="wave" class="dock-select" aria-label="sound">
    <option value="sine" selected>SINE</option><option value="chiptune">CHIPTUNE</option><option value="bell">BELL</option><option value="flute">FLUTE</option><option value="rave">RAVE STAB</option><option value="organ">DUB ORGAN</option><option value="choir">VOX CHOIR</option>
  </select>
  <div class="dock-actions"><button class="btn" id="regen">REGEN</button><button class="btn danger" id="clear">CLEAR</button></div>
</nav>
<script>
'use strict';
const $ = id => document.getElementById(id);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const SCALES = { major:[0,2,4,5,7,9,11], minor:[0,2,3,5,7,8,10], dorian:[0,2,3,5,7,9,10], phrygian:[0,1,3,5,7,8,10], pentatonic:[0,2,4,7,9], blues:[0,3,5,6,7,10] };
const STEPS = 16;
let scaleName = 'minor', root = 9, octave = 4, wave = 'sine', bpm = 100, delayRate = '1/8D', compAmount = 0.35, forcerAmount = 0.12, delayOn = true;
let pattern = [new Set([3]),new Set(),new Set(),new Set([1]),new Set(),new Set([4]),new Set(),new Set(),new Set([2]),new Set(),new Set(),new Set([5]),new Set(),new Set([3]),new Set(),new Set()];
let ctx = null, masterIn = null, delayNode = null, delayFb = null, delayWet = null, delayDry = null, echoLow = null, echoHigh = null, echoDrive = null, comp = null, busDrive = null, masterOut = null;
let playing = false, nextTime = 0, stepIdx = 0, timer = null;
function midiToFreq(m){return 440*Math.pow(2,(m-69)/12)}
function getRows(){return SCALES[scaleName].length}
function rowToMidi(row){return 12*(octave+1)+root+SCALES[scaleName][row]}
function midiLabel(m){return NOTE_NAMES[((m%12)+12)%12]+(Math.floor(m/12)-1)}
function delayRateToSeconds(rate,bpmVal){const quarter=60/bpmVal;const base={'1/4':quarter,'1/8':quarter/2,'1/16':quarter/4};const m=rate.match(/^(1\/(?:4|8|16))(T|D)?$/);if(!m)return quarter/2;let s=base[m[1]];if(m[2]==='T')s*=2/3;if(m[2]==='D')s*=1.5;return Math.min(s,1.5)}
function makeCurve(amount){const n=256,curve=new Float32Array(n),drive=1+amount*18;for(let i=0;i<n;i++){const x=i*2/(n-1)-1;curve[i]=Math.tanh(x*drive)/Math.tanh(drive)}return curve}
function ensureCtx(){if(ctx){if(ctx.state==='suspended')ctx.resume();return ctx}const Ctor=window.AudioContext||window.webkitAudioContext;if(!Ctor)return null;ctx=new Ctor();masterIn=ctx.createGain();masterIn.gain.value=.9;delayNode=ctx.createDelay(1.5);delayNode.delayTime.value=delayRateToSeconds(delayRate,bpm);delayFb=ctx.createGain();delayFb.gain.value=.28;delayWet=ctx.createGain();delayWet.gain.value=.24;delayDry=ctx.createGain();delayDry.gain.value=1;echoLow=ctx.createBiquadFilter();echoLow.type='lowshelf';echoLow.frequency.value=260;echoLow.gain.value=0;echoHigh=ctx.createBiquadFilter();echoHigh.type='highshelf';echoHigh.frequency.value=3300;echoHigh.gain.value=0;echoDrive=ctx.createWaveShaper();echoDrive.oversample='2x';echoDrive.curve=makeCurve(forcerAmount*forcerAmount*.20);comp=ctx.createDynamicsCompressor();comp.threshold.value=-16;comp.knee.value=8;comp.ratio.value=3;comp.attack.value=.01;comp.release.value=.1;busDrive=ctx.createWaveShaper();busDrive.oversample='2x';busDrive.curve=makeCurve(compAmount*compAmount*.16);masterOut=ctx.createGain();masterOut.gain.value=.76;masterIn.connect(delayDry);masterIn.connect(delayNode);delayNode.connect(delayWet);delayNode.connect(echoLow);echoLow.connect(echoHigh);echoHigh.connect(echoDrive);echoDrive.connect(delayFb);delayFb.connect(delayNode);delayDry.connect(comp);delayWet.connect(comp);comp.connect(busDrive);busDrive.connect(masterOut);masterOut.connect(ctx.destination);applyCompAmount();applyForcerAmount();applyDelayBypass();return ctx}
function applyCompAmount(){if(!ctx||!comp||!busDrive)return;const a=compAmount,t=ctx.currentTime,push=a*a;comp.threshold.setTargetAtTime(-6-push*26,t,.025);comp.ratio.setTargetAtTime(1.15+push*7.2,t,.025);comp.knee.setTargetAtTime(14-push*6,t,.025);comp.attack.setTargetAtTime(.006+(1-a)*.018,t,.025);comp.release.setTargetAtTime(.07+(1-a)*.18,t,.025);busDrive.curve=makeCurve(push*.16);masterOut.gain.setTargetAtTime(.88-push*.12,t,.025)}
function applyForcerAmount(){if(!ctx||!echoLow||!echoHigh||!echoDrive||!delayFb)return;const a=forcerAmount,t=ctx.currentTime,push=a*a;echoLow.gain.setTargetAtTime(-push*4.5,t,.035);echoHigh.gain.setTargetAtTime(-push*7.5,t,.035);echoDrive.curve=makeCurve(push*.20);const fbBase=Number($('delay-fb').value)/100;delayFb.gain.setTargetAtTime(Math.min(.82,fbBase+push*.025),t,.035)}
function applyDelayBypass(){if(!ctx||!delayWet)return;const mix=delayOn?Number($('delay-mix').value)/100*.62:0;delayWet.gain.setTargetAtTime(mix,ctx.currentTime,.012)}
function envGain(g,when,peak,attack,decay,sustain,release,dur){g.gain.setValueAtTime(.0001,when);g.gain.exponentialRampToValueAtTime(Math.max(peak,.0002),when+attack);g.gain.exponentialRampToValueAtTime(Math.max(peak*sustain,.0002),when+attack+decay);g.gain.exponentialRampToValueAtTime(.0001,when+dur+release)}
function noiseBuffer(){const len=Math.floor(ctx.sampleRate*.32),b=ctx.createBuffer(1,len,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return b}
function playNote(when,midi,duration,voiceScale){if(!ctx)return;const freq=midiToFreq(midi),peak=.20*voiceScale,dest=masterIn||ctx.destination;if(wave==='bell'){const carrier=ctx.createOscillator(),mod=ctx.createOscillator(),mg=ctx.createGain(),g=ctx.createGain();carrier.frequency.value=freq;mod.frequency.value=freq*3.4;mg.gain.value=freq*1.35;mod.connect(mg);mg.connect(carrier.frequency);carrier.connect(g);g.connect(dest);envGain(g,when,peak*1.35,.004,.06,.28,duration*3.4,duration*1.1);mg.gain.setValueAtTime(freq*1.35,when);mg.gain.exponentialRampToValueAtTime(freq*.08,when+duration*3.5);carrier.start(when);mod.start(when);carrier.stop(when+duration*4.7);mod.stop(when+duration*4.7);return}if(wave==='flute'){const o=ctx.createOscillator(),vib=ctx.createOscillator(),vg=ctx.createGain(),f=ctx.createBiquadFilter(),g=ctx.createGain();o.type='sine';o.frequency.value=freq;vib.type='sine';vib.frequency.value=5.2;vg.gain.value=freq*.006;vib.connect(vg);vg.connect(o.frequency);f.type='lowpass';f.frequency.value=2300;f.Q.value=.8;o.connect(f);f.connect(g);g.connect(dest);envGain(g,when,peak*.92,.035,.12,.62,.18,duration*1.35);const n=ctx.createBufferSource(),ng=ctx.createGain(),nf=ctx.createBiquadFilter();n.buffer=noiseBuffer();nf.type='bandpass';nf.frequency.value=3600;nf.Q.value=.7;ng.gain.value=.012*voiceScale;n.connect(nf);nf.connect(ng);ng.connect(dest);n.start(when);n.stop(when+duration*1.7);o.start(when);vib.start(when);o.stop(when+duration*1.7);vib.stop(when+duration*1.7);return}if(wave==='rave'){const g=ctx.createGain(),f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(4400,when);f.frequency.exponentialRampToValueAtTime(760,when+duration*.85);f.Q.value=2.4;['sawtooth','square'].forEach((type,i)=>{const o=ctx.createOscillator();o.type=type;o.frequency.value=freq*(i?1.005:.995);o.connect(f);o.start(when);o.stop(when+duration*1.5)});f.connect(g);g.connect(dest);envGain(g,when,peak*.85,.003,.045,.18,.10,duration*.95);return}if(wave==='organ'||wave==='choir'){const g=ctx.createGain(),f=ctx.createBiquadFilter();f.type=wave==='choir'?'bandpass':'lowpass';f.frequency.value=wave==='choir'?920:1800;f.Q.value=wave==='choir'?1.3:.9;const types=wave==='choir'?['sine','triangle','sine']:['square','triangle'];types.forEach((type,i)=>{const o=ctx.createOscillator();o.type=type;o.frequency.value=freq*(1+(i-1)*(wave==='choir'?.006:.003));o.connect(f);o.start(when);o.stop(when+duration*(wave==='choir'?2.5:1.8))});f.connect(g);g.connect(dest);envGain(g,when,peak*(wave==='choir'?.56:.82),wave==='choir'?.08:.018,.15,wave==='choir'?.72:.58,wave==='choir'?.38:.16,duration*1.45);return}const o=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter();o.type=wave==='chiptune'?'square':'sine';o.frequency.value=freq;f.type='lowpass';f.frequency.value=wave==='chiptune'?4200:5200;f.Q.value=.7;o.connect(f);f.connect(g);g.connect(dest);envGain(g,when,peak,.004,wave==='chiptune'?.035:.07,wave==='chiptune'?.25:.5,.08,duration*1.25);o.start(when);o.stop(when+duration*1.55)}
function render(){const rows=getRows();$('seq-head').innerHTML='<div>NOTE</div>'+Array.from({length:STEPS},(_,i)=>'<div>'+(i+1)+'</div>').join('');const grid=$('grid');grid.innerHTML='';grid.style.setProperty('--grid-rows',rows);grid.style.gridTemplateRows='repeat('+rows+', minmax(0,1fr))';for(let visual=rows-1;visual>=0;visual--){const lab=document.createElement('div');lab.className='note-label';lab.textContent=midiLabel(rowToMidi(visual));grid.appendChild(lab);for(let s=0;s<STEPS;s++){const c=document.createElement('button');c.className='cell';if(s%4===0)c.classList.add('beat');c.dataset.step=s;c.dataset.row=visual;c.setAttribute('aria-label','step '+(s+1)+' note '+lab.textContent);c.setAttribute('aria-pressed',pattern[s].has(visual));if(pattern[s].has(visual))c.classList.add('on');c.addEventListener('pointerdown',e=>{e.preventDefault();toggleCell(s,visual,c)});grid.appendChild(c)}}}
function toggleCell(step,row,el){if(pattern[step].has(row))pattern[step].delete(row);else pattern[step].add(row);el.classList.toggle('on',pattern[step].has(row));el.setAttribute('aria-pressed',pattern[step].has(row));if(pattern[step].has(row)){const c=ensureCtx();if(c)playNote(c.currentTime+.01,rowToMidi(row),.18,1)}}
function lightStep(step){document.querySelectorAll('.cell.lit').forEach(el=>el.classList.remove('lit'));document.querySelectorAll('.cell[data-step="'+step+'"]').forEach(el=>el.classList.add('lit'))}
function playStep(step,when,stepDur){const rows=Array.from(pattern[step]);if(!rows.length)return;const gainScale=1/Math.sqrt(rows.length);rows.forEach(row=>playNote(when,rowToMidi(row),stepDur*1.25,gainScale))}
function scheduler(){if(!playing||!ctx)return;while(nextTime<ctx.currentTime+.1){const stepDur=(60/bpm)/4,cur=stepIdx,when=nextTime;playStep(cur,when,stepDur);setTimeout(()=>lightStep(cur),Math.max(0,(when-ctx.currentTime)*1000));nextTime+=stepDur;stepIdx=(stepIdx+1)%STEPS}timer=setTimeout(scheduler,25)}
function syncPlayUI(){$('play-icon').textContent=playing?'■':'▶';$('play').classList.toggle('playing',playing)}
function start(){const c=ensureCtx();if(!c)return;playing=true;stepIdx=0;nextTime=c.currentTime+.05;syncPlayUI();scheduler()}
function stop(){playing=false;if(timer)clearTimeout(timer);timer=null;syncPlayUI();document.querySelectorAll('.cell.lit').forEach(el=>el.classList.remove('lit'))}
function regenerate(){const rows=getRows();for(let s=0;s<STEPS;s++){pattern[s]=new Set();const chance=s%4===0?.44:.28;if(Math.random()<chance)pattern[s].add(Math.floor(Math.random()*rows));if(Math.random()<.12)pattern[s].add(Math.floor(Math.random()*rows));if(s%4===0&&Math.random()<.10)pattern[s].add(Math.floor(Math.random()*rows))}render()}
function clearPattern(){pattern=Array.from({length:STEPS},()=>new Set());render()}
function setBpm(v){bpm=Number(v);$('bpm').value=bpm;$('bpm-display').textContent=bpm;if(delayNode&&ctx)delayNode.delayTime.setTargetAtTime(delayRateToSeconds(delayRate,bpm),ctx.currentTime,.04)}
function syncDelayToggle(){const btn=$('delay-on'),txt=$('delay-on-text');if(!btn||!txt)return;btn.classList.toggle('on',delayOn);btn.setAttribute('aria-pressed',delayOn);txt.textContent=delayOn?'ON':'OFF'}
function updateCompLabel(){const v=Number($('comp-amount').value);$('comp-amount-v').textContent=v}
function wire(){$('play').addEventListener('click',()=>playing?stop():start());$('regen').addEventListener('click',regenerate);$('clear').addEventListener('click',clearPattern);$('bpm').addEventListener('input',e=>setBpm(e.target.value));$('scale').addEventListener('change',e=>{scaleName=e.target.value;document.body.dataset.scale=scaleName;const rows=getRows();pattern.forEach(set=>Array.from(set).forEach(r=>{if(r>=rows)set.delete(r)}));render()});$('root').addEventListener('change',e=>{root=Number(e.target.value);render()});$('oct').addEventListener('change',e=>{octave=Number(e.target.value);render()});$('wave').addEventListener('change',e=>{wave=e.target.value});$('delay-on').addEventListener('click',()=>{delayOn=!delayOn;syncDelayToggle();applyDelayBypass()});$('delay-rate').addEventListener('change',e=>{delayRate=e.target.value;if(delayNode&&ctx)delayNode.delayTime.setTargetAtTime(delayRateToSeconds(delayRate,bpm),ctx.currentTime,.04)});$('delay-mix').addEventListener('input',e=>{$('delay-mix-v').textContent=e.target.value;applyDelayBypass()});$('delay-fb').addEventListener('input',e=>{$('delay-fb-v').textContent=e.target.value;applyForcerAmount()});$('forcer').addEventListener('input',e=>{forcerAmount=Number(e.target.value)/100;$('forcer-v').textContent=e.target.value;applyForcerAmount()});$('comp-amount').addEventListener('input',e=>{compAmount=Number(e.target.value)/100;updateCompLabel();applyCompAmount()});document.addEventListener('keydown',e=>{if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName))return;if(e.code==='Space'){e.preventDefault();playing?stop():start()}})}
wire();syncDelayToggle();updateCompLabel();render();
</script>
</body>
